name: Build, Sign, Notarise, and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Marketing version override (e.g. 1.0.0). Defaults to Xcode MARKETING_VERSION.'
        required: false

permissions:
  contents: write

env:
  SCHEME: Drazlo
  CONFIGURATION: Release
  BUILD_DIR: ${{ github.workspace }}/build
  SKIP_DMG_POLISH: '1'

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CERTIFICATES_P12 }}
          p12-password: ${{ secrets.CERTIFICATES_P12_PASSWORD }}
          keychain: build-signing
          create-keychain: true

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Resolve Swift package dependencies
        working-directory: FrameFlow
        run: |
          xcodebuild -resolvePackageDependencies \
            -project FrameFlow.xcodeproj \
            -scheme Drazlo

      - name: Set release version
        run: |
          # shellcheck source=Scripts/release_common.sh
          source Scripts/release_common.sh
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(release_marketing_version "${GITHUB_WORKSPACE}")"
          fi
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "Release version: ${VERSION}"

      - name: Prepare Config.swift for CI
        env:
          REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}
          WEB_PURCHASE_LINK_BASE_URL: ${{ secrets.WEB_PURCHASE_LINK_BASE_URL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          FEEDBACK_FORM_URL: ${{ secrets.FEEDBACK_FORM_URL }}
        run: |
          CONFIG_DIR="FrameFlow/FrameFlow/App/Utils"
          CONFIG_FILE="${CONFIG_DIR}/Config.swift"
          if [[ ! -f "${CONFIG_FILE}" ]]; then
            cp "${CONFIG_DIR}/Config.example.swift" "${CONFIG_FILE}"
            echo "Created Config.swift from Config.example.swift (gitignored locally on dev machines)."
          fi
          export CONFIG_FILE
          python3 <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path(os.environ["CONFIG_FILE"])
          text = path.read_text()

          def set_string(name: str, value: str | None) -> None:
              global text
              if not value:
                  return
              escaped = value.replace("\\", "\\\\").replace('"', '\\"')
              pattern = rf'(static let {name} = )"[^"]*"'
              replaced, count = re.subn(pattern, rf'\1"{escaped}"', text, count=1)
              if count == 0:
                  raise SystemExit(f"Could not inject {name} into Config.swift")
              text = replaced

          set_string("revenueCatAPIKey", os.environ.get("REVENUECAT_API_KEY"))
          set_string("webPurchaseLinkBaseURL", os.environ.get("WEB_PURCHASE_LINK_BASE_URL"))
          set_string("sentryDSN", os.environ.get("SENTRY_DSN"))
          set_string("postHogAPIKey", os.environ.get("POSTHOG_API_KEY"))
          set_string("feedbackFormURL", os.environ.get("FEEDBACK_FORM_URL"))

          path.write_text(text)
          PY

      - name: Archive and export signed app
        run: |
          chmod +x Scripts/*.sh
          ./Scripts/archive_release.sh

      - name: Notarise app
        env:
          NOTARY_APPLE_ID: ${{ secrets.APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.TEAM_ID || '6XP66CQ82V' }}
          NOTARY_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: ./Scripts/notarize_app.sh build/export/Drazlo.app

      - name: Build DMG
        run: ./Scripts/create_dmg.sh build/export/Drazlo.app

      - name: Notarise DMG
        env:
          NOTARY_APPLE_ID: ${{ secrets.APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.TEAM_ID || '6XP66CQ82V' }}
          NOTARY_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: ./Scripts/notarize_dmg.sh "build/Drazlo-${VERSION}.dmg"

      - name: Verify DMG
        run: |
          DMG="build/Drazlo-${VERSION}.dmg"
          codesign --verify --verbose=2 "${DMG}"
          spctl -a -vv -t open --context context:primary-signature "${DMG}"
          xcrun stapler validate "${DMG}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Drazlo-${{ env.VERSION }}-dmg
          path: build/Drazlo-${{ env.VERSION }}.dmg
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: build/Drazlo-${{ env.VERSION }}.dmg
          generate_release_notes: true
          draft: false
          prerelease: false
